<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ Convent School | Login Page</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --main-blue: #0a134d; 
            --accent-gold: #f2a93b; 
            --bg-white: #ffffff; 
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
        }
        
        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center;
            align-items: center;
            /* Using linear gradient overlay for better text readability on the BG */
            background: linear-gradient(rgba(10, 19, 77, 0.75), rgba(10, 19, 77, 0.75)), url('./background.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            padding: 20px;
        }

        /* --- UI Wrapper (Mobile View) --- */
        .phone { 
            width: 390px; 
            height: 844px; 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 40px; 
            border: 7px solid #222; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .phone-content {
            flex: 1;
            overflow-y: auto;
            padding: 25px 20px 110px; /* added bottom padding for the fixed footer */
        }

        .phone-content::-webkit-scrollbar { display: none; }

        .school-header { 
            text-align: center; 
            margin-bottom: 30px; 
            margin-top: 20px;
        }
        
        .school-header h1 { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--accent-gold); 
            letter-spacing: 1px;
            text-transform: uppercase; 
        }
        
        .auth-card { 
            background: #fff; 
            width: 100%; 
            padding: 28px 22px; 
            border-radius: 28px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
        }

        /* Toggle Switches */
        .role-selector, .method-selector { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 18px; 
            background: #f0f0f0; 
            padding: 4px; 
            border-radius: 10px; 
        }

        .role-btn, .method-btn { 
            flex: 1; 
            padding: 9px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 11px; 
            border: none;
            transition: all 0.2s ease;
        }

        .active { 
            background: var(--main-blue) !important; 
            color: #fff !important; 
        }
        
        /* Form Inputs */
        .input-group { 
            position: relative; 
            margin-bottom: 14px; 
        }

        .input-group i { 
            position: absolute; 
            left: 14px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--main-blue); 
            font-size: 14px;
        }

        input, select { 
            width: 100%; 
            padding: 12px 12px 12px 40px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 13px; 
        }
        
        .btn-main { 
            width: 100%; 
            padding: 14px; 
            background: var(--main-blue); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 8px; 
            transition: opacity 0.3s;
        }

        .btn-main:active { opacity: 0.8; }
        
        /* Avatar Upload */
        .img-upload { 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 2px dashed #ccc; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background: #fafafa; 
            cursor: pointer; 
        }

        #regPreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .footer-text { margin-top: 15px; font-size: 12px; color: #777; text-align: center; }
        .footer-text a { color: var(--main-blue); font-weight: 600; text-decoration: none; }
        .hidden { display: none; }

        /* --- Footer Section --- */
        .app-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 18px 10px;
            background: rgba(255, 255, 255, 0.96);
            border-top: 1px solid #eee;
            text-align: center;
            border-radius: 0 0 32px 32px;
        }

        .dev-tag {
            background: var(--main-blue);
            color: var(--accent-gold);
            font-size: 8px;
            padding: 2px 8px;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            vertical-align: middle;
        }

        .dev-name { color: var(--main-blue); font-size: 15px; font-weight: 700; margin-left: 5px; }

        .tech-stack {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 12px;
        }

        .social-icon {
            width: 38px;
            height: 38px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: var(--main-blue);
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icon:hover {
            background: var(--main-blue);
            color: var(--accent-gold);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="phone-content">
            <header class="school-header">
                <h1>XYZ Convent School</h1>
            </header>

            <div class="auth-card">
                <div id="loginBox">
                    <h3 style="margin-bottom: 15px; font-size: 16px; color: #333; text-align: center;">Sign In</h3>
                    
                    <div class="role-selector">
                        <button class="role-btn active" onclick="setRole('student', this)">STUDENT</button>
                        <button class="role-btn" onclick="setRole('teacher', this)">TEACHER</button>
                    </div>

                    <div class="method-selector">
                        <button class="method-btn active" id="btnPass" onclick="toggleMethod('pass')">Password</button>
                        <button class="method-btn" id="btnMpin" onclick="toggleMethod('mpin')">MPIN</button>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="number" id="loginUser" placeholder="Mobile Number" oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10);">
                    </div>

                    <div id="passInputGroup" class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPass" placeholder="Password">
                    </div>

                    <div id="mpinInputGroup" class="input-group hidden">
                        <i class="fas fa-th"></i>
                        <input type="number" id="loginMpin" placeholder="4-Digit PIN" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
                    </div>

                    <button class="btn-main" id="loginBtn">LOG IN</button>
                    <p class="footer-text">Don't have an account? <a href="javascript:void(0)" onclick="toggleView('reg')">Register</a></p>
                </div>

                <div id="registerBox" class="hidden">
                    <h3 style="margin-bottom: 15px; font-size: 16px; color: #333; text-align: center;">Create Account</h3>
                    
                    <div class="role-selector">
                        <div class="role-btn active" id="regTabStudent" onclick="setRegRole('student')">As Student</div>
                        <div class="role-btn" id="regTabTeacher" onclick="setRegRole('teacher')">As Teacher</div>
                    </div>

                    <label for="fileInput" class="img-upload">
                        <i class="fas fa-camera" id="camIcon" style="color:#bbb;"></i>
                        <img id="regPreview">
                    </label>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewImg(this)">
                    
                    <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Full Name"></div>
                    <div class="input-group"><i class="fas fa-phone"></i><input type="number" id="regUser" placeholder="Mobile Number" oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10);"></div>
                    
                    <div style="display: flex; gap: 8px;">
                        <div class="input-group" style="flex:1.5;"><i class="fas fa-key"></i><input type="password" id="regPass" placeholder="Password"></div>
                        <div class="input-group" style="flex:1;"><i class="fas fa-th"></i><input type="number" id="regMpin" placeholder="PIN" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);"></div>
                    </div>

                    <div id="studentRegFields">
                        <div class="input-group">
                            <i class="fas fa-school"></i>
                            <select id="regClass">
                                <option value="">Select Class</option>
                                <option value="LKG">LKG</option><option value="UKG">UKG</option>
                                <option value="1">Class 1</option><option value="2">Class 2</option>
                                <option value="3">Class 3</option><option value="4">Class 4</option>
                                <option value="5">Class 5</option><option value="6">Class 6</option>
                                <option value="7">Class 7</option><option value="8">Class 8</option>
                                <option value="9">Class 9</option><option value="10">Class 10</option>
                                <option value="11">Class 11</option><option value="12">Class 12</option>
                            </select>
                        </div>
                        <input type="text" id="regAdm" placeholder="Admission No" style="margin-bottom: 10px;">
                    </div>

                    <div id="teacherRegFields" class="hidden">
                        <div class="input-group"><i class="fas fa-book"></i><input type="text" id="regSubject" placeholder="Primary Subject"></div>
                        <div class="input-group"><i class="fas fa-shield-alt"></i><input type="password" id="regSecret" placeholder="Admin Secret Key"></div>
                    </div>

                    <button class="btn-main" id="regBtn" style="background: #16a34a;">REGISTER NOW</button>
                    <p class="footer-text">Joined already? <a href="javascript:void(0)" onclick="toggleView('login')">Login</a></p>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <div>
                <span class="dev-tag">Developer</span>
                <span class="dev-name">Haren-Dev 🚀</span>
            </div>
            <div class="tech-stack">
                <a href="https://www.linkedin.com/in/harsh-sen-276000288" target="_blank" class="social-icon">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://github.com/Harsh-sen-2006" target="_blank" class="social-icon">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </footer>
    </div>

    <script type="module" src="login.js"></script>
    <script>
        // State management
        let selectedRole = 'student'; 
        let regRole = 'student'; 
        let loginMethod = 'pass';

        function setRole(role, btn) {
            selectedRole = role;
            const buttons = document.querySelectorAll('#loginBox .role-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setRegRole(role) {
            regRole = role;
            document.getElementById('regTabStudent').classList.toggle('active', role === 'student');
            document.getElementById('regTabTeacher').classList.toggle('active', role === 'teacher');
            
            // Show/Hide fields based on role
            if(role === 'teacher') {
                document.getElementById('studentRegFields').classList.add('hidden');
                document.getElementById('teacherRegFields').classList.remove('hidden');
            } else {
                document.getElementById('studentRegFields').classList.remove('hidden');
                document.getElementById('teacherRegFields').classList.add('hidden');
            }
        }

        function toggleMethod(method) {
            loginMethod = method;
            document.getElementById('btnPass').classList.toggle('active', method === 'pass');
            document.getElementById('btnMpin').classList.toggle('active', method === 'mpin');
            
            const passGrp = document.getElementById('passInputGroup');
            const mpinGrp = document.getElementById('mpinInputGroup');
            
            if(method === 'mpin') {
                passGrp.classList.add('hidden');
                mpinGrp.classList.remove('hidden');
            } else {
                passGrp.classList.remove('hidden');
                mpinGrp.classList.add('hidden');
            }
        }

        function toggleView(view) {
            if(view === 'reg') {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('registerBox').classList.remove('hidden');
            } else {
                document.getElementById('loginBox').classList.remove('hidden');
                document.getElementById('registerBox').classList.add('hidden');
            }
        }

        // Image handling
        let profileBase64 = "";
        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileBase64 = e.target.result;
                    const preview = document.getElementById('regPreview');
                    preview.src = profileBase64;
                    preview.style.display = 'block';
                    document.getElementById('camIcon').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // Export functions for login.js
        window.getProfileImg = () => profileBase64;
        window.getLoginMethod = () => loginMethod;
        window.getRegRole = () => regRole;
        window.getSelectedRole = () => selectedRole;
    </script>
</body>
</html>
