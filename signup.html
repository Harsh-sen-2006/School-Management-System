<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XYZ Convent School | Student Self-Registration</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #2563eb, #22c55e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .box { width: 400px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    h2 { text-align: center; color: #1f2937; margin-bottom: 5px; }
    input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
    button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .link-btn { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    #message { text-align: center; font-size: 13px; margin-top: 10px; font-weight: 600; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Student Registration</h2>
    <p style="text-align:center; font-size:12px; color:gray;">Fill details to create your ID</p>

    <input type="text" id="username" placeholder="Full Name (Username)" />
    <input type="email" id="email" placeholder="Email Address" />
    <input type="text" id="admissionNo" placeholder="Admission Number" />
    <input type="number" id="rollNo" placeholder="Roll Number" />
    
    <div style="display:flex; gap:10px;">
        <select id="className">
            <option value="">Select Class</option>
            <option value="Class 1">Class 1</option>
            <option value="Class 2">Class 2</option>
            <option value="Class 3">Class 3</option>
            <option value="Class 4">Class 4</option>
            <option value="Class 5">Class 5</option>
            <option value="Class 6">Class 6</option>
            <option value="Class 7">Class 7</option>
            <option value="Class 8">Class 8</option>
            <option value="Class 9">Class 9</option>
            <option value="Class 10">Class 10</option>
            <option value="Class 11">Class 11</option>
            <option value="Class 12">Class 12</option>
        </select>

        <select id="section">
            <option value="">Section</option>
            <option value="A">Section A</option>
            <option value="B">Section B</option>
            <option value="C">Section C</option>
            <option value="D">Section D</option>
        </select>
    </div>

    <select id="gender">
        <option value="">Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <input type="password" id="password" placeholder="Create Password (Min 6 chars)" />
    <textarea id="bio" placeholder="About Me / Bio (Optional)"></textarea>

    <button onclick="registerStudent()">Register Now</button>
    <button class="link-btn" onclick="window.location.href='login.html'">Back to Login</button>

    <p id="message"></p>
  </div>

  <script type="module" src="signup.js"></script>
</body>
</html>
